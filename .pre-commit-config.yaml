# Pre-commit hooks for ai-vibe-card.
#
# Install once per clone:
#   pip install pre-commit && pre-commit install
#
# Then every `git commit` runs the hooks below against staged files.

repos:
  # gitleaks — secret scanning. Detects accidentally committed API keys,
  # private keys, JWTs, etc. before they hit the remote.
  #
  # TODO: pin `rev` to a specific commit SHA from
  #       https://github.com/gitleaks/gitleaks
  #       (network access was unavailable when this file was generated, so
  #       the placeholder tag below is used. Replace with the SHA of the
  #       latest stable release tag, e.g. `git ls-remote --tags https://github.com/gitleaks/gitleaks`).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2  # placeholder — replace with full 40-char SHA
    hooks:
      - id: gitleaks
