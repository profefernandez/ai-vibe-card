# nginx config for the "web" container. Serves the built React SPA and
# reverse-proxies /api and /uploads to the api container.
#
# This sits behind SPanel's public nginx — TLS, HSTS, and HTTP→HTTPS redirects
# happen there, not here.

server {
    listen      8080 default_server;
    server_name _;

    # Hide nginx version
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml application/xml+rss
        image/svg+xml font/woff font/woff2;

    # Reasonable client limits — the API enforces upload size separately.
    client_max_body_size 10m;
    client_body_buffer_size 16k;

    # ── Health (cheap, no proxy) ──────────────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # ── Proxy API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Proxy uploads (served statically by api container) ────────────────
    location /uploads/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Long cache for upload assets (filenames are deterministic per user).
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── robots.txt (dynamic — proxied to api) ─────────────────────────────
    location = /robots.txt {
        proxy_pass         http://api:3001/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets — long cache, immutable hashes from Vite ────────────
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── SPA fallback — every other path returns index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # No cache on the HTML shell so deploys are picked up immediately.
        add_header Cache-Control "no-store, must-revalidate";
    }

    # ── Block dotfiles ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
